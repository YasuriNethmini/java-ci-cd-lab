name:Java CIPipeline

on:
 push:
  branches:
   -main

jobs:
 build:

  runs-on: ubuntu-latest

  steps:

  -name: Checkout Repository
   uses: actions/checkout@v4

  -name: Set Up JDK
   uses: actions/setup-java@4
   with:
    distribution: 'temurin'
    java-vertion: '17'

  -name: Compile Java Program
   run: javac Main.java

  -name: Run Java Program
   run: java main